description: |
  H265 NAL Vault is a small attack/defense service that stores team secrets
  inside raw HEVC Annex-B bitstreams. The hidden channel is the low bit of
  primary_pic_type in AUD NAL units, type 35. The intended attack is to abuse
  an exposed debug endpoint, download another team's .h265 carrier, and decode
  the hidden flag. The intended defense is to remove or protect the debug file
  endpoint while keeping /api/store and /api/read working for the checker.
