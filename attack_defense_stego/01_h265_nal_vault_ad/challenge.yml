description: |
  H265 Evidence Portal là một web service attack/defense mô phỏng cổng import và
  chia sẻ bằng chứng CCTV đã redact. Service gắn custody marker nội bộ của từng
  case vào raw HEVC Annex-B bitstream bằng AUD NAL type 35. Hướng attack là khai
  thác public redacted preview: preview đã strip VCL slice chứa hình ảnh nhưng
  vẫn giữ AUD NAL chứa kênh ẩn. Hướng defense là strip AUD khỏi preview hoặc tạo
  preview sạch, đồng thời giữ dashboard, /api/store và /api/read hoạt động.
