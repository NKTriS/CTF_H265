id: ad_01_h265_nal_vault
name: H265 NAL Vault AD
category: Attack/Defense H.265 Steganography
difficulty: easy
flag: blockChainPTIT{4ud_n4l_d3bug_l34k_br34ks_h265_v4ult}
type: attack-defense
files:
  service:
    - service/Dockerfile
    - service/docker-compose.yml
    - service/app.py
    - service/stego.py
    - service/requirements.txt
  checker:
    - checker/checker.py
    - checker/CHECKER_EXPLAIN.md
  solution:
    - solution/WRITEUP.md
    - solution/ATTACK.md
    - solution/DEFENSE.md
    - solution/exploit.py
    - solution/defense.patch
description: |
  H265 NAL Vault là một service attack/defense lưu bí mật của đội chơi trong
  raw HEVC Annex-B bitstream. Kênh ẩn nằm ở bit thấp nhất của primary_pic_type
  trong AUD NAL type 35. Hướng attack là khai thác debug endpoint bị lộ, tải
  carrier .h265 của đội khác và giải mã flag. Hướng defense là xóa hoặc bảo vệ
  debug endpoint, đồng thời giữ /api/store và /api/read hoạt động cho checker.
