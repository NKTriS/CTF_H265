  - public/cctv_export.log
description: |
  Một file CCTV H.265 bị tải ra ngoài trước thời điểm rò rỉ dữ liệu. File không có SEI đáng ngờ.
  Hãy tìm kênh ẩn và khôi phục flag.
hints:
  - Log giúp xác định bối cảnh, không chứa flag.
  - Không phải metadata.
  - Hãy nghĩ tới parity của motion-vector sample.
